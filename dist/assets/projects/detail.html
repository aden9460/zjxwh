<!doctype html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>项目详情 - 郑嘉雯</title>
	<link rel="stylesheet" href="project-detail.css">
</head>
<body>
	<main class="detail-shell">
		<nav class="detail-nav">
			<a href="../../index.html#work">返回主页</a>
			<span>项目详情</span>
		</nav>

		<section class="detail-hero">
			<p id="project-meta"></p>
			<h1 id="project-title"></h1>
			<p id="project-summary"></p>
		</section>

		<section id="project-app-section" class="detail-section project-page-section project-app-section">
			<div class="section-title-row">
				<h2 id="project-app-title">项目网页</h2>
				<a id="project-app-link" href="#" target="_blank" rel="noopener noreferrer">打开完整页面</a>
			</div>
			<p id="project-app-description" class="section-intro"></p>
			<div id="project-framework-block" class="asset-block">
				<div class="asset-copy">
					<h3 id="project-framework-title"></h3>
					<p id="project-framework-description"></p>
				</div>
				<div class="framework-preview">
					<a id="project-framework-link" href="#" target="_blank" rel="noopener noreferrer">
						<img id="project-framework-image" src="" alt="项目框架图">
					</a>
				</div>
			</div>
			<div class="app-preview">
				<iframe id="project-app-frame" title="项目网页预览"></iframe>
			</div>
			<div id="project-video-block" class="asset-block video-block">
				<div class="asset-copy">
					<h3 id="project-video-title"></h3>
					<p id="project-video-description"></p>
				</div>
				<div id="project-video-holder" class="video-holder"></div>
			</div>
		</section>

		<section id="project-manual-section" class="detail-section project-page-section">
			<div class="section-title-row">
				<h2 id="project-manual-title"></h2>
			</div>
			<p id="project-manual-description" class="section-intro"></p>
			<ul id="project-manual-points" class="point-list"></ul>
			<div id="project-manual-gallery" class="gallery manual-gallery"></div>
		</section>

		<section id="project-points-section" class="detail-section">
			<h2>完整介绍</h2>
			<ul id="project-points" class="point-list"></ul>
		</section>

		<section id="project-gallery-section" class="detail-section">
			<h2>项目图片</h2>
			<div id="project-gallery" class="gallery"></div>
		</section>

		<section id="project-files-section" class="detail-section">
			<h2>相关文件</h2>
			<div id="project-files" class="file-list"></div>
		</section>
	</main>

	<script src="project-detail.js"></script>
</body>
</html>
